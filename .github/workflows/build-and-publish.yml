name: 🏗️ Build and Publish Images

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.57.0, v1.58.0, etc.)
  workflow_dispatch:
    inputs:
      playwright_version:
        description: 'Playwright version to build (e.g., 1.57.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests (for faster rebuilds)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        base: [bookworm, ubi9]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Playwright version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger - use input version
            VERSION="${{ github.event.inputs.playwright_version }}"
            echo "📌 Manual build for Playwright v${VERSION}"
          else
            # Tag trigger - extract version from tag
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "🏷️ Building from tag: v${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building Playwright v${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.base }} images
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "🏗️ Building ${{ matrix.base }} images for Playwright v${VERSION}"

          # Add --latest flag only for bookworm
          if [ "${{ matrix.base }}" == "bookworm" ]; then
            CONTAINER_ENGINE=docker ./build.sh --base ${{ matrix.base }} --playwright-version "${VERSION}" --latest --repo "${{ env.IMAGE_NAME }}"
          else
            CONTAINER_ENGINE=docker ./build.sh --base ${{ matrix.base }} --playwright-version "${VERSION}" --repo "${{ env.IMAGE_NAME }}"
          fi

          echo "✅ ${{ matrix.base }} images built successfully"

      - name: Test ${{ matrix.base }} images
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: |
          echo "🧪 Testing ${{ matrix.base }} images..."

          VERSION="${{ steps.version.outputs.version }}"

          # Install playwright with matching version FIRST (before requirements.txt)
          pip install playwright==${VERSION}

          # Then install other test dependencies
          pip install -r tests/requirements.txt

          # Test only this base's images (skip headless for CI speed)
          CONTAINER_ENGINE=docker pytest tests/ -v -k "${{ matrix.base }}" --tb=short

          echo "✅ ${{ matrix.base }} tests passed"

      - name: Push ${{ matrix.base }} images to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "🚀 Pushing ${{ matrix.base }} images to GitHub Container Registry..."

          # Push all tags for this base
          docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.IMAGE_NAME }}:${{ matrix.base }}" | xargs -I {} docker push {}

          echo "✅ ${{ matrix.base }} images pushed successfully"
